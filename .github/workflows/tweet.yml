name: Generate Hourly Tweet Text

on:
  schedule:
    # Runs at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch: 

# This gives the action permission to push files back to your repo
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Generate the Tweet
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python videogamebot.py

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest_tweet.txt
          
          # Check if there are actually changes to commit
          if ! git diff --staged --quiet; then
            git commit -m "Generated new tweet text"
            # Pull any of your recent manual edits so it doesn't crash
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi
